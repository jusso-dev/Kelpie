services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kelpie
      POSTGRES_PASSWORD: kelpie
      POSTGRES_DB: kelpie
    volumes:
      - kelpie_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kelpie -d kelpie"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://kelpie:kelpie@db:5432/kelpie
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev_only_change_me_dev_only_change_me_dev_only_change_me}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:3000}
      EMAIL_FROM: ${EMAIL_FROM:-kelpie@example.com}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CRON_SECRET: ${CRON_SECRET:-dev_only_change_me_cron_secret}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      STORAGE_DRIVER: local
      STORAGE_LOCAL_DIR: /data/uploads
      KELPIE_ALLOW_PRIVATE_NETWORKS: ${KELPIE_ALLOW_PRIVATE_NETWORKS:-false}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_PRIVATE_KEY: ${APNS_PRIVATE_KEY:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-dev.kelpie.mobile}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - kelpie_uploads:/data/uploads
    command: ["node", "server.js"]

  cron:
    image: alpine:3.20
    depends_on:
      app:
        condition: service_started
    environment:
      CRON_SECRET: ${CRON_SECRET:-dev_only_change_me_cron_secret}
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl >/dev/null
        echo "Kelpie cron sidecar ready"
        while true; do
          for path in sla webhooks enrichment connectors ti mobile-push; do
            curl -sS -X POST -H "Authorization: Bearer $$CRON_SECRET" \
              "http://app:3000/api/cron/$$path" >/dev/null || true
          done
          sleep 60
        done

volumes:
  kelpie_pg:
  kelpie_uploads:
